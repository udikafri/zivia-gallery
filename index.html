<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>צביה כפרי — גלריית ציורים</title>
<meta name="description" content="גלריית הציורים של צביה כפרי — אקריליק ושמן על בד ועץ. כל היצירות זמינות לרכישה בגלריית Under $1000.">
<meta property="og:type" content="website">
<meta property="og:title" content="צביה כפרי — גלריית ציורים">
<meta property="og:description" content="ציורי אקריליק ושמן מאת צביה כפרי. כל היצירות זמינות לרכישה בגלריית Under $1000.">
<meta property="og:image" content="https://h6kx5up96ffz2y7n.public.blob.vercel-storage.com/products/temp-1782556324520-g47vao2tjwo-1782556517800-yjmt883w4th.webp">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f3ec;
    --card: #fffdf9;
    --ink: #2b241b;
    --muted: #6f6250;
    --accent: #9a5f33;
    --line: #d9cdb9;
    --serif: 'Frank Ruhl Libre', 'Times New Roman', serif;
    --sans: 'Assistant', 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.6;
  }

  /* ---------- header ---------- */
  header {
    text-align: center;
    padding: 4.5rem 1.5rem 3rem;
    max-width: 46rem;
    margin-inline: auto;
  }
  header .kicker {
    font-size: .8rem;
    letter-spacing: .35em;
    color: var(--accent);
    text-transform: uppercase;
    margin-block-end: 1rem;
  }
  header h1 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: clamp(2.6rem, 7vw, 4rem);
    line-height: 1.15;
  }
  header .subtitle {
    margin-block-start: .9rem;
    color: var(--muted);
    font-size: 1.1rem;
    font-weight: 400;
  }
  header .rule {
    width: 3.5rem;
    height: 2px;
    background: var(--accent);
    margin: 1.6rem auto 0;
    opacity: .6;
  }
  .gallery-link {
    display: inline-block;
    margin-block-start: 1.6rem;
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    border-block-end: 1px solid currentColor;
    transition: opacity .2s;
  }
  .gallery-link:hover { opacity: .75; }
  #top-controls {
    position: absolute;
    top: 1.1rem;
    left: 1.1rem; /* physical left on purpose — must not jump when dir flips */
    direction: ltr; /* fixed button order too — lang then share, in both languages */
    display: flex;
    gap: .5rem;
    z-index: 10;
  }
  html[dir="rtl"] #share-menu { direction: rtl; }
  .top-btn {
    display: inline-flex;
    align-items: center;
    gap: .4rem;
    background: var(--card);
    border: 1.5px solid var(--accent);
    color: var(--accent);
    font-family: var(--sans);
    font-size: .9rem;
    font-weight: 600;
    padding: .45rem 1rem;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(60, 45, 20, .12);
    transition: background .2s, color .2s;
  }
  .top-btn:hover { background: var(--accent); color: #fff; }
  .top-btn svg { width: 1em; height: 1em; }
  #share-menu {
    position: absolute;
    top: calc(100% + .5rem);
    left: 0;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 12px 32px rgba(60, 45, 20, .18);
    padding: .35rem;
    min-width: 13rem;
    display: none;
    flex-direction: column;
  }
  #share-menu.open { display: flex; }
  .share-item {
    display: flex;
    align-items: center;
    gap: .6rem;
    padding: .45rem .6rem;
    border: none;
    background: none;
    border-radius: 7px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: .9rem;
    cursor: pointer;
    text-decoration: none;
    text-align: start;
  }
  .share-item:hover { background: var(--bg); }
  .share-item svg { width: 1.35rem; height: 1.35rem; flex: 0 0 auto; }

  /* ---------- grid ---------- */
  main {
    max-width: 78rem;
    margin-inline: auto;
    padding: 0 1.25rem 4rem;
    columns: 4 17rem;
    column-gap: 1.25rem;
  }
  .card {
    break-inside: avoid;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
    margin-block-end: 1.25rem;
    box-shadow: 0 1px 3px rgba(60, 45, 20, .07);
    transition: box-shadow .25s, transform .25s;
  }
  .card:hover {
    box-shadow: 0 10px 30px rgba(60, 45, 20, .14);
    transform: translateY(-3px);
  }
  .card img {
    display: block;
    width: 100%;
    height: auto;
    cursor: zoom-in;
    background: #eee7da;
  }
  .card .info { padding: .9rem 1rem 1rem; }
  .card h2 {
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 500;
    line-height: 1.3;
  }
  .card .meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    color: var(--muted);
    font-size: .9rem;
    margin-block-start: .2rem;
  }
  .card .price { color: var(--ink); font-weight: 600; font-size: 1rem; }
  .card .actions {
    display: flex;
    gap: .5rem;
    margin-block-start: .75rem;
  }
  .btn {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .4rem;
    font-family: var(--sans);
    font-size: .85rem;
    font-weight: 600;
    padding: .5rem .75rem;
    border-radius: 4px;
    border: 1px solid var(--accent);
    cursor: pointer;
    text-decoration: none;
    transition: background .2s, color .2s;
  }
  .btn-buy { background: var(--accent); color: #fff; }
  .btn-buy:hover { background: #8a5730; }
  .btn-share { background: transparent; color: var(--accent); flex: 0 0 auto; }
  .btn-share:hover { background: var(--accent); color: #fff; }
  .btn svg { width: 1em; height: 1em; }

  /* ---------- lightbox ---------- */
  #lightbox {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: none;
    background: rgba(20, 16, 10, .97);
    overflow-y: auto;
    padding: 2rem 1rem;
  }
  #lightbox.open { display: block; }
  .lb-inner {
    max-width: 56rem;
    margin-inline: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: lbIn .25s ease;
  }
  @keyframes lbIn { from { opacity: 0; transform: scale(.97); } }
  .lb-inner img {
    max-width: 100%;
    max-height: 72vh;
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
    background: #eee7da;
  }
  .lb-panel {
    color: #f2ecdf;
    text-align: center;
    max-width: 40rem;
    padding: 1.4rem .5rem 3rem;
  }
  .lb-panel h2 { font-family: var(--serif); font-weight: 500; font-size: 1.7rem; }
  .lb-panel .en { color: #d4c8b0; font-size: 1rem; font-style: italic; }
  .lb-panel .dims { color: #d4c8b0; font-size: .95rem; margin-block-start: .3rem; }
  .lb-panel p.desc { margin-block-start: .8rem; font-weight: 300; font-size: .98rem; }
  .lb-panel .price { margin-block-start: .7rem; font-size: 1.15rem; font-weight: 600; }
  .lb-actions {
    display: flex;
    gap: .7rem;
    justify-content: center;
    margin-block-start: 1.1rem;
    flex-wrap: wrap;
  }
  .lb-actions .btn { flex: 0 0 auto; padding-inline: 1.3rem; }
  .lb-close, .lb-nav {
    position: fixed;
    background: rgba(255, 255, 255, .1);
    border: none;
    color: #f2ecdf;
    width: 2.75rem;
    height: 2.75rem;
    border-radius: 50%;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
    z-index: 51;
  }
  .lb-close:hover, .lb-nav:hover { background: rgba(255, 255, 255, .25); }
  .lb-close { top: 1rem; inset-inline-start: 1rem; }
  .lb-nav.prev { top: 50%; inset-inline-end: .75rem; transform: translateY(-50%); }
  .lb-nav.next { top: 50%; inset-inline-start: .75rem; transform: translateY(-50%); }
  @media (max-width: 640px) { .lb-nav { display: none; } }

  /* ---------- toast ---------- */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    inset-inline-start: 50%;
    transform: translateX(50%);
    background: var(--ink);
    color: #fff;
    padding: .6rem 1.3rem;
    border-radius: 100px;
    font-size: .9rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    z-index: 60;
  }
  #toast.show { opacity: 1; }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: .95rem;
    padding: 2.5rem 1rem 3.5rem;
    border-block-start: 1px solid var(--line);
  }
  footer a { font-weight: 600; }
  footer a { color: var(--accent); }
</style>
</head>
<body>

<div id="top-controls">
  <button id="lang-toggle" class="top-btn" onclick="toggleLang()" aria-label="Switch language">EN/עב</button>
  <button id="site-share-btn" class="top-btn" onclick="toggleShareMenu(event)" aria-haspopup="true" aria-expanded="false"></button>
  <div id="share-menu" role="menu"></div>
</div>

<header>
  <div class="kicker" id="h-kicker">Zivia Kafri · Fine Art</div>
  <h1 id="h-name">צביה כפרי</h1>
  <p class="subtitle" id="h-subtitle"></p>
  <div class="rule"></div>
  <a class="gallery-link" id="full-gallery-link" href="#" target="_blank" rel="noopener"></a>
</header>

<main id="grid"></main>

<div id="lightbox" aria-modal="true" role="dialog">
  <button class="lb-close" aria-label="סגירה" onclick="closeLightbox()">✕</button>
  <button class="lb-nav prev" aria-label="הקודם" onclick="navLightbox(-1)">‹</button>
  <button class="lb-nav next" aria-label="הבא" onclick="navLightbox(1)">›</button>
  <div class="lb-inner">
    <img id="lb-img" alt="">
    <div class="lb-panel">
      <h2 id="lb-title"></h2>
      <div class="en" id="lb-en"></div>
      <div class="dims" id="lb-dims"></div>
      <p class="desc" id="lb-desc"></p>
      <div class="price" id="lb-price"></div>
      <div class="lb-actions">
        <a class="btn btn-buy" id="lb-buy" href="#" target="_blank" rel="noopener"></a>
        <button class="btn btn-share" id="lb-share"></button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<footer>
  <span id="footer-text"></span>
  <a id="footer-gallery-link" href="#" target="_blank" rel="noopener">Under $1000</a>
</footer>

<script src="paintings.js"></script>
<script>
  const paintings = window.PAINTINGS || [];
  const shareIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>';

  const I18N = {
    he: {
      dir: 'rtl', locale: 'he-IL',
      docTitle: 'צביה כפרי — גלריית ציורים',
      name: 'צביה כפרי',
      subtitle: 'ציורי אקריליק ושמן על בד ועץ — נוף, טבע ורגש בצבע',
      galleryLink: '↗ לכל היצירות בגלריית Under $1000',
      buy: 'לרכישה בגלריה',
      buyLb: 'לצפייה ולרכישה בגלריה',
      share: 'שיתוף היצירה',
      shareAria: 'שיתוף',
      toast: 'הקישור הועתק 🎨',
      footer: 'כל היצירות זמינות לרכישה בגלריית',
      cm: 'ס״מ',
      shareText: (t) => `"${t}" — ציור מאת צביה כפרי`,
      shareSite: 'שיתוף',
      siteShareText: 'גלריית הציורים של צביה כפרי',
      copyLink: 'העתקת קישור',
      email: 'אימייל',
      more: 'עוד אפשרויות…',
      instaToast: 'הקישור הועתק — הדביקו בסטורי או בביו באינסטגרם',
    },
    en: {
      dir: 'ltr', locale: 'en-IL',
      docTitle: 'Zivia Kafri — Painting Gallery',
      name: 'Zivia Kafri',
      subtitle: 'Acrylic and oil paintings on canvas and wood — landscape, nature and emotion in color',
      galleryLink: '↗ All works at the Under $1000 gallery',
      buy: 'Buy at the gallery',
      buyLb: 'View & buy at the gallery',
      share: 'Share this painting',
      shareAria: 'Share',
      toast: 'Link copied 🎨',
      footer: 'All works are available for purchase at',
      cm: 'cm',
      shareText: (t) => `"${t}" — a painting by Zivia Kafri`,
      shareSite: 'Share',
      siteShareText: 'Zivia Kafri — painting gallery',
      copyLink: 'Copy link',
      email: 'Email',
      more: 'More options…',
      instaToast: 'Link copied — paste it into your Instagram story or bio',
    },
  };

  // ?lang= in a shared URL wins over the visitor's saved preference.
  const urlLang = new URLSearchParams(location.search).get('lang');
  let lang =
    urlLang === 'en' || urlLang === 'he'
      ? urlLang
      : localStorage.getItem('gallery-lang') === 'en' ? 'en' : 'he';
  let fmt;
  const T = () => I18N[lang];
  const pTitle = (p) => (lang === 'en' && p.titleEn ? p.titleEn : p.title);
  const pSubTitle = (p) => (lang === 'en' ? (p.titleEn ? p.title : '') : p.titleEn || '');
  const pDesc = (p) => (lang === 'en' ? p.descriptionEn || p.description : p.description) || '';
  const pDims = (p) => (p.widthCm && p.heightCm ? `${p.widthCm}×${p.heightCm} ${T().cm}` : '');

  document.getElementById('full-gallery-link').href = window.GALLERY_URL;
  document.getElementById('footer-gallery-link').href = window.GALLERY_URL;

  const grid = document.getElementById('grid');

  function renderStatic() {
    const t = T();
    document.documentElement.lang = lang;
    document.documentElement.dir = t.dir;
    document.title = t.docTitle;
    document.getElementById('h-name').textContent = t.name;
    document.getElementById('h-subtitle').textContent = t.subtitle;
    document.getElementById('full-gallery-link').textContent = t.galleryLink;
    document.getElementById('footer-text').textContent = t.footer;
    document.getElementById('lb-buy').textContent = t.buyLb;
    document.getElementById('lb-share').textContent = t.share;
    document.getElementById('site-share-btn').innerHTML = `${shareIcon}<span>${t.shareSite}</span>`;
    buildShareMenu();
  }

  function renderGrid() {
    grid.innerHTML = '';
    paintings.forEach((p, i) => {
      const card = document.createElement('article');
      card.className = 'card';
      card.id = p.slug;
      card.innerHTML = `
        <img src="${p.localThumb || p.thumb || p.image}" alt="${pTitle(p)}" loading="lazy" onclick="openLightbox(${i})"
             onerror="this.onerror=null;this.src='${p.thumb || p.image}'">
        <div class="info">
          <h2>${pTitle(p)}</h2>
          <div class="meta"><span>${pDims(p)}</span><span class="price">${p.price ? fmt.format(p.price) : ''}</span></div>
          <div class="actions">
            <a class="btn btn-buy" href="${p.url}" target="_blank" rel="noopener">${T().buy}</a>
            <button class="btn btn-share" aria-label="${T().shareAria}" onclick="share(${i})">${shareIcon}</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  function setLang(l) {
    lang = l;
    localStorage.setItem('gallery-lang', l);
    fmt = new Intl.NumberFormat(T().locale, { style: 'currency', currency: 'ILS', maximumFractionDigits: 0 });
    renderStatic();
    renderGrid();
    if (current >= 0) openLightbox(current);
  }

  function toggleLang() {
    setLang(lang === 'he' ? 'en' : 'he');
  }

  /* ---------- lightbox ---------- */
  let current = -1;
  const lb = document.getElementById('lightbox');

  function openLightbox(i) {
    current = i;
    const p = paintings[i];
    const lbImg = document.getElementById('lb-img');
    lbImg.onerror = () => { lbImg.onerror = null; lbImg.src = p.image || p.thumb; };
    lbImg.src = p.localImage || p.image || p.thumb;
    lbImg.alt = p.title;
    document.getElementById('lb-title').textContent = pTitle(p);
    document.getElementById('lb-en').textContent = pSubTitle(p);
    document.getElementById('lb-dims').textContent = pDims(p);
    document.getElementById('lb-desc').textContent = pDesc(p);
    document.getElementById('lb-price').textContent = p.price ? fmt.format(p.price) : '';
    document.getElementById('lb-buy').href = p.url;
    document.getElementById('lb-share').onclick = () => share(i);
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
    history.replaceState(null, '', '#' + p.slug);
  }

  function closeLightbox() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    current = -1;
    history.replaceState(null, '', location.pathname + location.search);
  }

  function navLightbox(dir) {
    if (current < 0) return;
    openLightbox((current + dir + paintings.length) % paintings.length);
  }

  lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    /* Arrows follow reading direction: RTL right = previous, LTR right = next */
    if (e.key === 'ArrowRight') navLightbox(lang === 'he' ? -1 : 1);
    if (e.key === 'ArrowLeft') navLightbox(lang === 'he' ? 1 : -1);
  });

  /* ---------- toast ---------- */
  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2600);
  }

  /* ---------- share a single painting ---------- */
  async function share(i) {
    const p = paintings[i];
    const url =
      location.origin + location.pathname + (lang === 'en' ? '?lang=en' : '') + '#' + p.slug;
    const text = T().shareText(pTitle(p));
    if (navigator.share) {
      try { await navigator.share({ title: text, text, url }); return; } catch (e) { /* cancelled */ }
    }
    await navigator.clipboard.writeText(url);
    showToast(T().toast);
  }

  /* ---------- share the whole site ---------- */
  const brandIcon = (bg, glyph) =>
    `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="12" fill="${bg}"/>${glyph}</svg>`;
  const SICONS = {
    whatsapp: brandIcon('#25D366',
      '<path fill="#fff" d="M12 5.6a6.1 6.1 0 0 0-5.2 9.3L6 18l3.2-.8A6.1 6.1 0 1 0 12 5.6zm3.1 8.6c-.2.5-1 .9-1.4.9-.4.1-.8.1-2.6-.6-2.2-.9-3.5-3.1-3.6-3.3-.1-.1-.8-1.1-.8-2.1 0-1 .5-1.5.7-1.7.2-.2.4-.2.6-.2h.4c.1 0 .3 0 .5.4l.7 1.6c0 .1.1.3 0 .4l-.3.4-.4.4c-.1.1-.2.3-.1.5.1.2.6 1 1.3 1.6.9.8 1.6 1 1.9 1.1.2.1.4.1.5-.1l.6-.8c.2-.2.3-.2.5-.1l1.5.7c.2.1.4.2.4.3.1.1.1.4-.1.6z"/>'),
    facebook: brandIcon('#1877F2',
      '<path fill="#fff" d="M13.3 19v-6.2h2.1l.3-2.4h-2.4V8.9c0-.7.2-1.2 1.2-1.2h1.3V5.6c-.2 0-1-.1-1.9-.1-1.9 0-3.2 1.2-3.2 3.3v1.6H8.6v2.4h2.1V19h2.6z"/>'),
    telegram: brandIcon('#229ED9',
      '<path fill="#fff" d="M5.6 11.7l11.6-4.5c.5-.2 1 .1.8.9l-2 9.3c-.1.6-.5.8-1 .5l-3-2.2-1.5 1.4c-.2.2-.3.3-.6.3l.2-3.1 5.7-5.1c.2-.2 0-.3-.3-.1l-7 4.4-3-.9c-.6-.2-.6-.7.1-.9z"/>'),
    x: brandIcon('#000000',
      '<path fill="#fff" d="M13.5 10.9L18.3 5.5h-1.4l-4 4.6-3.2-4.6H5.5l5 7.2-5 5.8h1.4l4.3-5 3.5 5h4.2l-5.4-7.6zm-1.6 1.8l-.5-.7-4-5.6h1.7l3.2 4.6.5.7 4.2 6h-1.7l-3.4-5z"/>'),
    instagram: brandIcon('#E4405F',
      '<rect x="6.8" y="6.8" width="10.4" height="10.4" rx="3" fill="none" stroke="#fff" stroke-width="1.5"/><circle cx="12" cy="12" r="2.5" fill="none" stroke="#fff" stroke-width="1.5"/><circle cx="15.4" cy="8.6" r=".9" fill="#fff"/>'),
    email: brandIcon('#8a7d6a',
      '<rect x="5.8" y="7.8" width="12.4" height="8.8" rx="1.5" fill="none" stroke="#fff" stroke-width="1.5"/><path d="M6.5 9l5.5 4.2L17.5 9" fill="none" stroke="#fff" stroke-width="1.5"/>'),
    copy: brandIcon('#a26a3f',
      '<path fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" d="M10.6 13.4l2.8-2.8M9.2 11.8l-1.6 1.6a2.4 2.4 0 0 0 3.4 3.4l1.6-1.6M14.8 12.2l1.6-1.6a2.4 2.4 0 0 0-3.4-3.4l-1.6 1.6"/>'),
    more: brandIcon('#5f5443',
      '<g fill="none" stroke="#fff" stroke-width="1.5"><circle cx="15.5" cy="7.5" r="1.8"/><circle cx="8.5" cy="12" r="1.8"/><circle cx="15.5" cy="16.5" r="1.8"/><path d="M10.1 11.1l3.8-2.7M10.1 12.9l3.8 2.7"/></g>'),
  };

  function siteShareUrl() {
    return location.origin + location.pathname + (lang === 'en' ? '?lang=en' : '');
  }

  function buildShareMenu() {
    const t = T();
    const url = encodeURIComponent(siteShareUrl());
    const text = encodeURIComponent(t.siteShareText);
    const items = [
      { icon: 'whatsapp', label: 'WhatsApp', href: `https://wa.me/?text=${text}%0A${url}` },
      { icon: 'facebook', label: 'Facebook', href: `https://www.facebook.com/sharer/sharer.php?u=${url}` },
      { icon: 'telegram', label: 'Telegram', href: `https://t.me/share/url?url=${url}&text=${text}` },
      { icon: 'x', label: 'X (Twitter)', href: `https://twitter.com/intent/tweet?url=${url}&text=${text}` },
      { icon: 'instagram', label: 'Instagram', action: 'instagram' },
      { icon: 'email', label: t.email, href: `mailto:?subject=${text}&body=${text}%0A${url}` },
      { icon: 'copy', label: t.copyLink, action: 'copy' },
    ];
    if (navigator.share) items.push({ icon: 'more', label: t.more, action: 'native' });
    const menu = document.getElementById('share-menu');
    menu.innerHTML = '';
    for (const it of items) {
      let el;
      if (it.href) {
        el = document.createElement('a');
        el.href = it.href;
        el.target = '_blank';
        el.rel = 'noopener';
        el.addEventListener('click', closeShareMenu);
      } else {
        el = document.createElement('button');
        el.type = 'button';
        el.addEventListener('click', () => shareAction(it.action));
      }
      el.className = 'share-item';
      el.setAttribute('role', 'menuitem');
      el.innerHTML = `${SICONS[it.icon]}<span>${it.label}</span>`;
      menu.appendChild(el);
    }
  }

  async function shareAction(kind) {
    const t = T();
    if (kind === 'copy' || kind === 'instagram') {
      await navigator.clipboard.writeText(siteShareUrl());
      showToast(kind === 'instagram' ? t.instaToast : t.toast);
    } else if (kind === 'native') {
      try {
        await navigator.share({ title: t.siteShareText, text: t.siteShareText, url: siteShareUrl() });
      } catch (e) { /* cancelled */ }
    }
    closeShareMenu();
  }

  function toggleShareMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById('share-menu');
    const open = menu.classList.toggle('open');
    document.getElementById('site-share-btn').setAttribute('aria-expanded', String(open));
  }

  function closeShareMenu() {
    document.getElementById('share-menu').classList.remove('open');
    document.getElementById('site-share-btn').setAttribute('aria-expanded', 'false');
  }

  document.addEventListener('click', (e) => {
    if (!document.getElementById('top-controls').contains(e.target)) closeShareMenu();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeShareMenu();
  });

  /* ---------- init ---------- */
  setLang(lang);

  /* ---------- deep link: #slug opens that painting ---------- */
  function openFromHash() {
    if (!location.hash) return;
    const idx = paintings.findIndex((p) => p.slug === decodeURIComponent(location.hash.slice(1)));
    if (idx >= 0) setTimeout(() => openLightbox(idx), 150);
  }
  window.addEventListener('hashchange', openFromHash);
  openFromHash();
</script>
</body>
</html>
